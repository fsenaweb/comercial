; Limites de upload da imagem base (php:8.4-fpm) - 2M/8M de fábrica - nunca
; tinham sido ajustados. Achado real (2026-07-23): restaurar um backup de
; 2,1M falhava com "Escolha um backup local ou envie um arquivo" mesmo com o
; arquivo selecionado - o PHP descarta $_POST/$_FILES inteiros e em silêncio
; quando o corpo excede post_max_size, então tanto `file` quanto `filename`
; chegavam vazios no Laravel. Backups (Configurações > Backup e restauração)
; incluem o dump do banco + storage/app/public (logo, uploads), tendendo a
; crescer com o catálogo (13 mil produtos importados do legado) - 100M dá
; folga real. Mantido consistente com `client_max_body_size` no nginx
; (docker/nginx/default.conf).
upload_max_filesize = 100M
post_max_size = 100M
