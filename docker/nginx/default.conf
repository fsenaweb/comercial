server {
    listen 80;
    server_name _;
    # 100M: acompanha upload_max_filesize/post_max_size do php-fpm
    # (docker/php/uploads.ini) - restaurar backup precisa caber o .zip
    # inteiro (dump do banco + storage/app/public), tendendo a crescer com
    # o catálogo. Achado real, 2026-07-23: 20M já não sobrava para NF-e
    # grandes nem para backups depois da importação dos 13 mil produtos.
    client_max_body_size 100M;

    # API (Laravel) e rotas Blade (comprovante térmico e impressão de
    # etiquetas) — mesma origem do front, sem CORS. routes/api.php já é
    # servido sob o prefixo /api pelo próprio Laravel; /sales/{id}/receipt e
    # /labels/print são as únicas rotas Blade (ver docs/01-architecture.md).
    #
    # root aqui precisa ser o MESMO caminho absoluto usado no container php-fpm
    # (/var/www/html/public) — SCRIPT_FILENAME é resolvido pelo php-fpm na sua
    # própria árvore de arquivos, não na do nginx.
    location ~ ^/(api|sales|sanctum|labels)(/|$) {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Arquivos enviados pelo usuário (ex.: logo da loja), via storage:link
    # (public/storage -> storage/app/public). Nome de arquivo é sempre um UUID
    # novo a cada upload (ver UpdateStoreSettingLogoAction), então é seguro
    # cachear "para sempre" — trocar o logo nunca reaproveita uma URL antiga.
    location /storage/ {
        root /var/www/html/public;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA estática (build do Nuxt, ssr:false) — tudo que não é /api, /sales ou /sanctum.
    # Roteamento é 100% client-side (Vue Router), então qualquer caminho não
    # encontrado como arquivo cai direto no index.html — sem tentar $uri/ (evita
    # redirect 301 desnecessário para rotas prerenderizadas em subpastas).
    root /var/www/frontend;
    index index.html;

    # Sem Cache-Control explícito, o navegador aplica cache heurístico e pode
    # continuar servindo um index.html/bundle antigo (com bugs já corrigidos)
    # mesmo depois de um novo build no servidor — só um hard refresh resolveria.
    # _nuxt/* tem nome com hash de conteúdo (ex.: 0LFMWdi5.js): pode cachear
    # "para sempre", pois qualquer mudança de código gera um arquivo novo.
    # index.html não tem hash: precisa ser revalidado a cada carregamento.
    location /_nuxt/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
