server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # API (Laravel) e rota do comprovante térmico — mesma origem do front, sem CORS.
    # routes/api.php já é servido sob o prefixo /api pelo próprio Laravel;
    # /sales/{id}/receipt é a única rota Blade (ver docs/01-architecture.md).
    #
    # root aqui precisa ser o MESMO caminho absoluto usado no container php-fpm
    # (/var/www/html/public) — SCRIPT_FILENAME é resolvido pelo php-fpm na sua
    # própria árvore de arquivos, não na do nginx.
    location ~ ^/(api|sales|sanctum)(/|$) {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # SPA estática (build do Nuxt, ssr:false) — tudo que não é /api, /sales ou /sanctum.
    # Roteamento é 100% client-side (Vue Router), então qualquer caminho não
    # encontrado como arquivo cai direto no index.html — sem tentar $uri/ (evita
    # redirect 301 desnecessário para rotas prerenderizadas em subpastas).
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}
